working_dir: .working_dir/idea2video

chat_model:
  init_args:
    model: google/gemini-2.5-flash-lite-preview-09-2025
    model_provider: openai
    api_key: "BURAYA_GEMINI_VEYA_OPENROUTER_KEY_YAZ"
    base_url: https://openrouter.ai/api/v1

image_generator:
  class_path: tools.ImageGeneratorNanobananaGoogleAPI
  init_args:
    api_key: "BURAYA_IMAGE_GENERATOR_KEY_YAZ"

video_generator:
  class_path: tools.VideoGeneratorKlingAPI     # Kling için
  init_args:
    model: kling-3.0
    api_key: "BURAYA_KLING_AI_KEYINI_YAZ"
